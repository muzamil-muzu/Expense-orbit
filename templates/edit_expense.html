{% extends 'base.html' %}
{% block content %}




<!-- Page Header -->
<div class="page-header">
    <h1><i class="fas fa-edit"></i> Edit Expense</h1>
    <p class="page-subtitle">Update your expense details</p>
</div>

<!-- Form Card -->
<div class="card" style="max-width: 600px; margin: 0 auto;">
    <form method="POST">
        <!-- Amount Group -->
        <div class="form-group">
            <label for="amount"><i class="fas fa-money-bill"></i> Amount</label>
            <div style="display: flex;">
                <span style="display: flex; align-items: center; padding: 0 14px; background: rgba(15, 23, 42, 0.6); border: 1px solid var(--border-color); border-right: none; border-radius: 8px 0 0 8px; font-weight: 600; color: var(--text-muted);">₹</span>
                <input type="number" id="amount" name="amount" placeholder="0.00" step="0.01" required value="{{ expense.amount }}"
                       style="border-radius: 0 8px 8px 0; flex: 1;">
            </div>
        </div>

        <!-- Category Group -->
        <div class="form-group">
            <label for="category"><i class="fas fa-tag"></i> Category</label>
            <select id="category" name="category" required>
                <option value="" disabled>-- Select a Category --</option>
                {% for cat in categories %}
                <option value="{{ cat.name }}" {% if expense.category == cat.name %}selected{% endif %}>&#xf02b; &nbsp; {{ cat.name }}</option>
                {% endfor %}
            </select>
        </div>

        <!-- Note Group -->
        <div class="form-group">
            <label for="note"><i class="fas fa-note-sticky"></i> Note / Description</label>
            <input type="text" id="note" name="note" placeholder="Add a note (optional)" value="{{ expense.note }}">
        </div>

        <!-- Date Group -->
        <div class="form-group">
            <label for="date"><i class="fas fa-calendar"></i> Date</label>
            <input type="date" id="date" name="date" required value="{{ expense.expense_date.strftime('%Y-%m-%d') }}">
        </div>

        <!-- Buttons -->
        <div style="display: flex; gap: 12px; margin-top: 30px;">
            <button type="submit" class="btn" style="flex: 1; justify-content: center;">
                <i class="fas fa-save"></i> Update Expense
            </button>
            <a href="/" class="btn btn-outline" style="flex: 1; justify-content: center; text-decoration: none;">
                <i class="fas fa-times"></i> Cancel
            </a>
        </div>
    </form>
</div>

{% endblock %}
