<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | ExpenseOrbit</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #05050a;
            background-image:
                radial-gradient(circle at 80% 30%, rgba(161, 140, 209, 0.08), transparent 50%),
                radial-gradient(circle at 20% 70%, rgba(79, 172, 254, 0.08), transparent 50%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #f8fafc;
        }

        .register-container {
            width: 100%;
            max-width: 420px;
        }

        .register-card {
            background: rgba(15, 15, 20, 0.6);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.6);
            overflow: hidden;
            animation: slideUp 0.6s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .register-header {
            padding: 40px 30px 30px;
            text-align: center;
            position: relative;
        }

        .register-header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 30px;
            right: 30px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(161, 140, 209, 0.3), rgba(79, 172, 254, 0.3), transparent);
        }

        .register-logo {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 20px;
            box-shadow: 0 0 30px rgba(161, 140, 209, 0.3);
            border: 2px solid rgba(161, 140, 209, 0.2);
        }

        .register-header h1 {
            font-size: 26px;
            font-weight: 800;
            background: linear-gradient(to right, #a18cd1, #4facfe);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 6px;
        }

        .register-header p {
            font-size: 14px;
            color: #94a3b8;
            font-weight: 400;
        }

        .register-body {
            padding: 30px;
        }

        .form-group {
            margin-bottom: 22px;
        }

        .form-group label {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
            font-weight: 600;
            color: #e2e8f0;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group label i {
            color: #a18cd1;
            font-size: 12px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 18px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            font-size: 15px;
            font-family: inherit;
            font-weight: 500;
            transition: all 0.3s ease;
            background: rgba(5, 5, 10, 0.5);
            color: #f8fafc;
            -webkit-appearance: none;
        }

        .form-group input:focus {
            outline: none;
            border-color: #a18cd1;
            box-shadow: 0 0 0 3px rgba(161, 140, 209, 0.15);
            background: rgba(5, 5, 10, 0.7);
        }

        .form-group input::placeholder {
            color: #64748b;
        }

        .password-hint {
            font-size: 12px;
            color: #94a3b8;
            margin-top: 8px;
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .password-hint i {
            color: #4facfe;
        }

        .register-btn {
            width: 100%;
            padding: 14px 20px;
            background: linear-gradient(135deg, #a18cd1, #4facfe);
            color: #05050a;
            border: none;
            border-radius: 50px;
            font-size: 15px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 4px 20px rgba(161, 140, 209, 0.3);
            margin-top: 8px;
        }

        .register-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(161, 140, 209, 0.5);
        }

        .register-footer {
            text-align: center;
            margin-top: 28px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
        }

        .register-footer p {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 6px;
        }

        .register-footer a {
            color: #a18cd1;
            text-decoration: none;
            font-weight: 700;
            font-size: 14px;
            transition: color 0.3s ease;
        }

        .register-footer a:hover {
            color: #4facfe;
        }

        .alert {
            margin-bottom: 20px;
            padding: 14px 16px;
            border-radius: 12px;
            border-left: 3px solid;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
            font-weight: 500;
            animation: slideDown 0.3s ease;
        }

        .alert-danger {
            background: rgba(239, 68, 68, 0.1);
            color: #f87171;
            border-color: #ef4444;
        }

        .alert-success {
            background: rgba(16, 185, 129, 0.1);
            color: #34d399;
            border-color: #10b981;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 480px) {
            .register-header { padding: 30px 20px 24px; }
            .register-header h1 { font-size: 22px; }
            .register-body { padding: 24px 20px; }
            .register-logo { width: 60px; height: 60px; }
        }
    </style>
</head>
<body>

<div class="register-container">
    <div class="register-card">
        <div class="register-header">
            <img src="{{ url_for('static', filename='logo.png') }}" alt="ExpenseOrbit" class="register-logo">
            <h1>Create Account</h1>
            <p>Start your financial journey today</p>
        </div>

        <div class="register-body">
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }}">
                            <i class="fas fa-{{ 'check-circle' if category == 'success' else 'exclamation-circle' }}"></i>
                            <span>{{ message }}</span>
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST">
                <div class="form-group">
                    <label><i class="fas fa-user"></i> Full Name</label>
                    <input type="text" name="name" placeholder="John Doe" required>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> Email Address</label>
                    <input type="email" name="email" placeholder="you@example.com" required>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Password</label>
                    <input type="password" name="password" placeholder="••••••••" required minlength="6">
                    <div class="password-hint">
                        <i class="fas fa-info-circle"></i> Use at least 6 characters
                    </div>
                </div>

                <button type="submit" class="register-btn">
                    <i class="fas fa-user-check"></i> Create Account
                </button>
            </form>

            <div class="register-footer">
                <p>Already have an account?</p>
                <a href="{{ url_for('login') }}">Sign in here</a>
            </div>
        </div>
    </div>
</div>

</body>
</html>
